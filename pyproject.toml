[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "antigravity-iot-anomaly"
version = "2.0.0"
description = "End-to-End IoT Anomaly Detection System — Bi-LSTM Autoencoder + XGBoost Hybrid Ensemble"
requires-python = ">=3.10"

dependencies = [
    # Core ML & data
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scikit-learn>=1.3.0",
    "scipy>=1.11.0",
    "joblib>=1.3.0",
    # Deep learning — requires Python <=3.12; swap tensorflow-gpu for CUDA builds
    "tensorflow>=2.16.0",
    # Gradient boosting
    "xgboost>=1.7.0",
    # Streaming
    "kafka-python>=2.0.2",
    # API
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "pydantic>=2.4.0",
    # Monitoring
    "evidently>=0.4.0",
    # Visualisation
    "matplotlib>=3.7.0",
    "seaborn>=0.13.0",
    # Utilities
    "tqdm>=4.66.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "httpx>=0.25.0",
]

# ── uv configuration ──────────────────────────────────────────────────────────
[tool.uv]
# The lock file (uv.lock) is generated by `uv lock` and pinned to this file.
# Developers and CI must run `uv sync` — never `pip install` directly.
dev-dependencies = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "httpx>=0.25.0",
]

[tool.setuptools.packages.find]
# Equivalent to find_packages() in setup.py — discovers src/ automatically.
where = ["."]
